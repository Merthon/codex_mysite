        <p class="eyebrow">POST / TECH</p>
        <h1>静态站也可以很好玩</h1>
        <p class="article-meta">2026.05.02 · 技术</p>
        <p>个人博客不一定需要复杂后台。很多体验可以通过少量前端脚本完成，而且更轻、更容易部署。</p>
        <h2>交互从局部开始</h2>
        <p>文章搜索、主题切换、阅读进度和本地留言，都不需要服务器。它们只需要清楚的状态和友好的反馈。</p>
        <h2>内容仍然是主角</h2>
        <p>动效最好像背景音乐，能增强氛围，但不能抢走文章本身的注意力。</p>
      </article>
      <section class="article-comments" aria-label="文章评论">
        <h2>本地评论</h2>
        <form class="message-form small" data-comment-form>
          <label><span>昵称</span><input name="name" required maxlength="18" placeholder="你的名字"></label>
          <label><span>评论</span><textarea name="message" required maxlength="140" placeholder="这篇文章让你想到什么？"></textarea></label>
          <button class="button primary" type="submit">保存评论</button>
        </form>
        <div class="message-list" data-comment-list></div>
