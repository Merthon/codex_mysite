<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Guestbook | Leo Merthon</title>
    <meta name="description" content="Leo Merthon 的本地留言板。">
    <link rel="icon" type="image/jpeg" href="assets/img/my.jpg">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body data-page="guestbook">
    <div class="scanline" aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="回到首页">
        <span class="brand-icon"><img src="assets/img/my.jpg" alt=""></span>
        <span>Leo Merthon</span>
      </a>
      <nav class="main-nav" aria-label="主导航">
        <a href="index.html" data-i18n="nav.home">主页</a>
        <a href="posts.html" data-i18n="nav.notes">笔记</a>
        <a href="archive.html" data-i18n="nav.archive">档案</a>
        <a href="about.html" data-i18n="nav.about">关于</a>
        <a href="guestbook.html" data-i18n="nav.guestbook">留言</a>
      </nav>
      <button class="lang-button" type="button" data-lang-toggle aria-label="Switch language">EN</button>
      <button class="icon-button" type="button" data-theme-toggle aria-label="切换主题" title="切换主题">◐</button>
    </header>

    <main>
      <section class="page-title">
        <p class="eyebrow">GUESTBOOK</p>
        <h1 data-i18n="guest.title">本地留言板</h1>
        <p data-i18n="guest.lead">留言会保存在当前浏览器里，适合做个人记录或演示互动。</p>
      </section>

      <section class="guestbook">
        <form class="message-form" data-guestbook-form>
          <label>
            <span data-i18n="form.name">昵称</span>
            <input name="name" required maxlength="18" placeholder="你的名字" data-i18n-placeholder="form.namePlaceholder">
          </label>
          <label>
            <span data-i18n="form.message">留言</span>
            <textarea name="message" required maxlength="140" placeholder="写点什么吧" data-i18n-placeholder="form.messagePlaceholder"></textarea>
          </label>
          <button class="button primary" type="submit" data-i18n="guest.submit">发送留言</button>
        </form>
        <div class="message-list" data-message-list aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026 Leo Merthon</span>
      <span><button class="link-button" type="button" data-clear-messages data-i18n="guest.clear">清空本地留言</button></span>
    </footer>
    <script src="assets/js/main.js" defer></script>
  </body>
</html>
