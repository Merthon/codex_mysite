        <h1>桌面上的小型宇宙</h1>
        <p class="article-meta">2026.05.10 · 日常</p>
        <p>桌面会泄露一个人的运行状态。东西多并不等于混乱，真正重要的是每件东西能不能回到自己的位置。</p>
        <h2>把常用物放在第一屏</h2>
        <p>每天都会用到的东西应该在手边，不常用的东西应该离开视线。这样开始做事时，就不会先被寻找消耗掉一格体力。</p>
        <h2>给杂物一个缓冲区</h2>
        <p>我会留一个小盒子收纳临时物品。它不是永久仓库，而是每天结束前要清理的小关卡。</p>
